data:
  root: data/ThermoDataBase
  train_dir: data/ThermoDataBase/train
  val_dir: data/ThermoDataBase/val
  classes:
    - Control Group
    - DM Group
  image_size: 224
  num_workers: 2

model:
  backbone: efficientnet_b0
  pretrained: true
  num_classes: 2
  dropout: 0.3
  feature_dim: 128

training:
  epochs: 50
  batch_size: 16
  learning_rate: 0.0001
  weight_decay: 0.0001
  early_stopping_patience: 10
  device: mps

preprocessing:
  normalize_mean: [0.485, 0.456, 0.406]
  normalize_std: [0.229, 0.224, 0.225]
  augmentation: true

outputs:
  models_dir: outputs/models
  features_dir: outputs/features
  logs_dir: outputs/logs